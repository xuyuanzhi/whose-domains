#thymeleaf
spring.thymeleaf.prefix=classpath:/views/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

spring.messages.basename = i18n/message

spring.mvc.static-path-pattern=/static/**

spring.devtools.restart.enabled=false

server.error.path=/error
server.error.whitelabel.enabled=false

spring.mvc.throw-exception-if-no-handler-found=true

#jwt
app.jwt.secret=${JWT_SECRET:please-change-this-default-secret-key-in-production}
app.jwt.issuer=system

# DeepSeek AI
ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
ai.deepseek.base-url=https://api.deepseek.com/v1
ai.deepseek.model=deepseek-v4-flash
ai.deepseek.max-tokens=4096
ai.deepseek.timeout-seconds=120
