<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{template::template_head}"></head>
<body>
	<header th:replace="~{template::template_header}"></header>
	
	<main>
		<section class="results-section active" id="resultsSection">
	        <div class="container">
	        	<div class="nav">
	        		<div class="path">
	        			<a href="/">Home</a>&nbsp;&nbsp;>>&nbsp;&nbsp;<span>Page Not Found</span>
	        		</div>
	        		<div class="search-container" style="margin:unset;">
	                    <input type="text" class="search-input-small" id="domainInput" placeholder="Enter a domain name (e.g., example.com)" required>
	                    <button class="search-btn search-btn-small" id="searchBtn">
	                        <i class="fas fa-search"></i>
	                        Search
	                    </button>
	                </div>
	        	</div>
	            
	            <div class="error-container">
			        <div class="error-icon">🔍</div>
			        <div class="error-code" style="font-size: 100px;font-weight: 700;color: #3498db;">404</div>
			        <h1>PAGE NOT FOUND</h1>
			        
			        <p class="message">
			            The page you're looking for doesn't exist or may have been moved.
			        </p>
			        
			        <div class="suggestions">
			            <h3>Possible reasons:</h3>
			            <ul>
			                <li>The page might have been moved or deleted</li>
			                <li>You may have typed the URL incorrectly</li>
			                <li>The link you followed might be outdated</li>
			            </ul>
			        </div>
			        
			        <div class="actions">
			            <a href="/" class="btn btn-primary">Back to Homepage</a>
			        </div>
			    </div>
	        </div>
	    </section>

	</main>
	
	<footer th:replace="~{template::template_footer}"></footer>
</body>
</html>
